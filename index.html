.sp{width:32px;height:32px;border-radius:50%;border:1px solid #333;border-top-color:#888;animation:spin 1s linear infinite}
.shell{width:100%;max-width:430px;margin:0 auto;height:100vh;height:100dvh;display:flex;flex-direction:column;background:#0a0a0a;position:relative;overflow:hidden}

.ip{width:100%;padding:10px 12px;background:#111;border:1px solid #222;color:#ccc;font-size:12px;font-family:monospace;outline:none}
.panel{position:absolute;inset:0;z-index:60;background:#0a0a0a;display:flex;flex-direction:column;animation:fi .3s ease}
.grid3{display:grid;grid-template-columns:repeat(3,1fr);gap:2px}

.hidden{display:none!important}

// ━━━━━━━━━━ 資料庫 ━━━━━━━━━━
const DB="WD3",SN="i";
function odb(){return new Promise((r,j)=>{const q=indexedDB.open(DB,1);q.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(SN))e.target.result.createObjectStore(SN,{keyPath:"id"}).createIndex("c","c")};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dbAll(){const d=await odb();return new Promise(r=>{d.transaction(SN).objectStore(SN).getAll().onsuccess=e=>r(e.target.result)})}
async function dbPut(i){const d=await odb();return new Promise(r=>{const t=d.transaction(SN,"readwrite");t.objectStore(SN).put(i);t.oncomplete=r})}
async function dbDel(id){const d=await odb();return new Promise(r=>{const t=d.transaction(SN,"readwrite");t.objectStore(SN).delete(id);t.oncomplete=r})}

// ━━━━━━━━━━ 工具 ━━━━━━━━━━
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function f2b(f){return new Promise(r=>{const a=new FileReader;a.onload=()=>r(a.result);a.readAsDataURL(f)})}
function rsz(d,m=1024){return new Promise(r=>{const i=new Image;i.onload=()=>{let w=i.width,h=i.height;if(w>m||h>m){const s=Math.min(m/w,m/h);w=w*s|0;h=h*s|0}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(i,0,0,w,h);r(c.toDataURL("image/jpeg",.85))};i.src=d})}

async function apiCall(model, input) {
  const px = localStorage.getItem("wd_p") || PROXY_URL;
  const tk = localStorage.getItem("wd_t") || API_TOKEN;
  const r = await fetch(`${px}/api/predict`, {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({ model, input, token: tk })
  });
  if (!r.ok) throw new Error(await r.text());
  const d = await r.json();
  if (d.error) throw new Error(d.error);
  return Array.isArray(d.output) ? d.output[0] : d.output;
}

async function shopAI(img, items) {
  const desc = items.map(i => {
    const c = CATS.find(x=>x.id===i.c);
    return `${c?.name}: ${i.n}`;
  }).join("\n");
  const r = await fetch("https://api.anthropic.com/v1/messages", {
    method:"POST", headers:{"Content-Type":"application/json"},
    body: JSON.stringify({
      model: "claude-sonnet-4-20250514", max_tokens: 800,
      messages: [{role:"user", content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:img.split(",")[1]}},
        {type:"text",text:`專業時尚顧問。分析照片中這件單品。我的衣櫃：\n${desc||"空"}\n用繁體中文純JSON回答：{"name":"商品名","v":"buy"或"skip","reason":"分析原因","fits":["搭配方案1","搭配方案2"],"style":"風格評語"}`}
      ]}]
    })
  });
  const j = await r.json();
  const t = j.content?.find(b=>b.type==="text")?.text || "";
  try { return JSON.parse(t.replace(/```json|```/g,"").trim()); }
  catch { return {name:"商品",v:"skip",reason:t,fits:[],style:""}; }
}

// ━━━━━━━━━━ 狀態 ━━━━━━━━━━
let state = {
  items: [],
  cat: "tops",
  sel: {},
  person: null,
  results: [],
  busy: false,
  step: "",
  pct: 0,
  view: "main", // main|wardrobe|shop|settings|result
  err: null,
  edit: false,
  shopImg: null,
  shopRes: null,
  shopBusy: false,
};

function setState(patch) {
  Object.assign(state, patch);
  render();
}

// ━━━━━━━━━━ 初始化 ━━━━━━━━━━
async function init() {
  let items = await dbAll().catch(() => []);
  if (!items.length && !localStorage.getItem("wd_i2")) {
    const batch = [];
    for (const [catId, list] of Object.entries(PRESETS)) {
      for (const it of list) {
        const url = UNS(it.u);
        batch.push({id:uid(), c:catId, img:url, tb:url, n:it.n, ts:Date.now()+Math.random()*1000});
      }
    }
    for (const i of batch) await dbPut(i);
    localStorage.setItem("wd_i2", "1");
    items = batch;
  }
  state.items = items;
  render();
}

// ━━━━━━━━━━ 操作 ━━━━━━━━━━
function selItems() {
  return Object.values(state.sel).map(id => state.items.find(i=>i.id===id)).filter(Boolean);
}
function catItems() {
  return state.items.filter(i=>i.c===state.cat).sort((a,b)=>b.ts-a.ts);
}
function toggle(item) {
  const s = {...state.sel};
  s[item.c] === item.id ? delete s[item.c] : s[item.c] = item.id;
  setState({sel: s});
}
async function addItem(catId, img, tb, name) {
  const item = {id:uid(), c:catId, img, tb, n:name, ts:Date.now()};
  await dbPut(item);
  setState({items: [...state.items, item]});
}
async function removeItem(id) {
  await dbDel(id);
  const s = {...state.sel};
  Object.keys(s).forEach(k => { if(s[k]===id) delete s[k]; });
  setState({items: state.items.filter(i=>i.id!==id), sel: s});
}

function pickFile(opts, cb) {
  const inp = document.createElement("input");
  inp.type = "file";
  inp.accept = "image/*";
  if (opts.multi) inp.multiple = true;
  inp.onchange = async (e) => {
    const files = Array.from(e.target.files || []);
    for (const f of files) {
      const b = await f2b(f);
      const r = await rsz(b);
      cb(r, f.name.replace(/\.[^.]+$/, ""));
    }
  };
  inp.click();
}

async function generate() {
  const si = selItems();
  if (!state.person || !si.length) return;
  setState({busy:true, results:[], err:null, view:"result"});
  const cloth = si.filter(i => CATS.find(c=>c.id===i.c)?.t);
  const acc = si.filter(i => !CATS.find(c=>c.id===i.c)?.t);
  try {
    let base = state.person;
    for (let i=0; i<cloth.length; i++) {
      setState({step:`試穿 ${cloth[i].n}`, pct:10+i/Math.max(cloth.length,1)*30});
      base = await apiCall("cuuupid/idm-vton", {
        human_img:base, garm_img:cloth[i].img, garment_des:"clothing item",
        category: CATS.find(c=>c.id===cloth[i].c).t,
        crop:false, seed:42, steps:30
      });
    }
    if (acc.length) {
      setState({step:"搭配配件", pct:50});
      base = await apiCall("black-forest-labs/flux-1.1-pro", {
        prompt:`Same person same outfit, also wearing ${acc.map(i=>i.n).join(", ")}, photorealistic`,
        image:base, prompt_upsampling:true, safety_tolerance:2
      });
    }
    setState({results:[base], pct:60});
    const poses = ["three quarter view thoughtful","full body side view walking","back view over shoulder"];
    for (let i=0; i<3; i++) {
      setState({step:`角度 ${i+2}/4`, pct:60+(i+1)*12});
      try {
        const p = await apiCall("black-forest-labs/flux-1.1-pro", {
          prompt:`Same person same outfit, ${poses[i]}, photorealistic fashion photo studio`,
          image:base, prompt_upsampling:true, safety_tolerance:2
        });
        setState({results:[...state.results, p]});
      } catch(e) { console.error(e); }
    }
  } catch(e) { setState({err:e.message}); }
  finally { setState({busy:false, step:"", pct:0}); }
}

async function analyzeShop() {
  if (!state.shopImg) return;
  setState({shopBusy:true, shopRes:null, err:null});
  try {
    const res = await shopAI(state.shopImg, state.items);
    setState({shopRes:res});
  } catch(e) { setState({err:e.message}); }
  finally { setState({shopBusy:false}); }
}

// ━━━━━━━━━━ 渲染 ━━━━━━━━━━
function h(tag, attrs, ...children) {
  const el = document.createElement(tag);
  if (attrs) Object.entries(attrs).forEach(([k,v]) => {
    if (k === "style" && typeof v === "object") Object.assign(el.style, v);
    else if (k.startsWith("on")) el.addEventListener(k.slice(2).toLowerCase(), v);
    else if (k === "className") el.className = v;
    else el.setAttribute(k, v);
  });
  children.flat().forEach(c => {
    if (c == null) return;
    el.appendChild(typeof c === "string" ? document.createTextNode(c) : c);
  });
  return el;
}

function render() {
  const app = document.getElementById("app");
  app.innerHTML = "";
  const s = state;
  const si = selItems();
  const ci = catItems();

  // ── 結果頁 ──
  if (s.view === "result" && s.results.length) {
    app.appendChild(h("div",{style:{padding:"14px 16px",display:"flex",justifyContent:"space-between",alignItems:"center"}},
      h("button",{className:"tx",onClick:()=>setState({view:"main",results:[]})},"返回"),
      h("span",{style:{fontSize:"12px",letterSpacing:"4px",color:"#999"}},"穿搭預覽"),
      h("span",{style:{width:"40px"}}),
    ));
    const grid = h("div",{style:{flex:"1",display:"grid",gridTemplateColumns:"1fr 1fr",gap:"1px"}});
    s.results.forEach((u,i) => {
      const cell = h("div",{style:{position:"relative",aspectRatio:"3/4",background:"#111",overflow:"hidden"}});
      const img = h("img",{src:u,style:{width:"100%",height:"100%",objectFit:"cover"}});
      cell.appendChild(img);
      cell.appendChild(h("span",{style:{position:"absolute",bottom:"8px",left:"10px",fontSize:"10px",color:"rgba(255,255,255,.5)",letterSpacing:"2px"}},["正面","側面","全身","背面"][i]));
      grid.appendChild(cell);
    });
    if (s.results.length < 4 && s.busy) {
      for (let i=0; i<4-s.results.length; i++) {
        const cell = h("div",{style:{aspectRatio:"3/4",background:"#111",display:"flex",alignItems:"center",justifyContent:"center"}});
        cell.appendChild(h("div",{className:"sp"}));
        grid.appendChild(cell);
      }
    }
    app.appendChild(grid);
    const dl = h("div",{style:{padding:"12px 16px",display:"flex",gap:"8px",justifyContent:"center"}});
    s.results.forEach((u,i) => {
      const a = h("a",{href:u,download:`look-${i+1}.jpg`,style:{padding:"8px 20px",fontSize:"11px",letterSpacing:"2px",color:"#888",border:"1px solid #333",textDecoration:"none"}},"下載 "+(i+1));
      dl.appendChild(a);
    });
    app.appendChild(dl);
    if (s.busy) app.appendChild(renderLoading());
    return;
  }

  // ── 衣櫃 ──
  if (s.view === "wardrobe") {
    const hdr = h("div",{className:"hd"},
      h("button",{className:"tx",onClick:()=>setState({view:"main",edit:false})},"返回"),
      h("span",{style:{fontSize:"12px",letterSpacing:"4px",color:"#999"}},"衣櫃"),
      h("button",{className:"tx",style:{color:s.edit?"#c44":undefined},onClick:()=>setState({edit:!s.edit})},s.edit?"完成":"編輯"),
    );
    app.appendChild(hdr);
    const tabs = h("div",{style:{display:"flex",overflow:"auto",padding:"0 12px",borderBottom:"1px solid #1a1a1a"}});
    CATS.forEach(c => {
      const n = s.items.filter(i=>i.c===c.id).length;
      tabs.appendChild(h("button",{style:{flexShrink:0,padding:"10px 16px",background:"none",border:"none",borderBottom:s.cat===c.id?"1px solid #fff":"1px solid transparent",color:s.cat===c.id?"#fff":"#555",fontSize:"12px",letterSpacing:"2px",cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif"},onClick:()=>setState({cat:c.id})},c.name));
    });
    app.appendChild(tabs);
    const upArea = h("div",{style:{padding:"12px"}});
    upArea.appendChild(h("div",{style:{border:"1px solid #222",padding:"16px",textAlign:"center",cursor:"pointer",color:"#444",fontSize:"12px",letterSpacing:"2px"},onClick:()=>pickFile({multi:true},(img,name)=>addItem(s.cat,img,img,name))},"+  上傳"));
    app.appendChild(upArea);
    const grid = h("div",{style:{flex:"1",overflow:"auto",padding:"0 12px 100px"},className:"grid3"});
    ci.forEach(it => {
      const on = s.sel[it.c] === it.id;
      const card = h("div",{style:{position:"relative"}});
      const box = h("div",{style:{aspectRatio:"1",overflow:"hidden",cursor:"pointer",outline:on?"2px solid #fff":"none",outlineOffset:"-2px",position:"relative",background:"#1a1a1a"},onClick:s.edit?undefined:()=>toggle(it)});
      const img = h("img",{src:it.tb,style:{width:"100%",height:"100%",objectFit:"cover",display:"block"}});
      img.onerror = () => { img.style.display = "none"; };
      box.appendChild(img);
      if (on) box.appendChild(h("div",{style:{position:"absolute",inset:0,background:"rgba(255,255,255,.08)"}}));
      card.appendChild(box);
      card.appendChild(h("div",{style:{fontSize:"10px",color:"#555",padding:"4px 2px",letterSpacing:"1px"}},it.n));
      if (s.edit) {
        card.appendChild(h("button",{style:{position:"absolute",top:"4px",right:"4px",width:"20px",height:"20px",background:"#000",border:"1px solid #333",color:"#888",fontSize:"10px",cursor:"pointer",display:"flex",alignItems:"center",justifyContent:"center"},onClick:()=>removeItem(it.id)},"×"));
      }
      grid.appendChild(card);
    });
    app.appendChild(grid);
    if (si.length > 0) {
      const bottom = h("div",{style:{position:"absolute",bottom:0,left:0,right:0,padding:"12px 16px 24px",background:"linear-gradient(0deg,#0a0a0a 70%,transparent)"}});
      bottom.appendChild(h("button",{className:"btn",onClick:()=>setState({view:"main",edit:false})},"套用 "+si.length+" 件"));
      app.appendChild(bottom);
    }
    return;
  }

  // ── 購物助手 ──
  if (s.view === "shop") {
    app.appendChild(h("div",{className:"hd"},
      h("button",{className:"tx",onClick:()=>setState({view:"main",shopImg:null,shopRes:null})},"返回"),
      h("span",{style:{fontSize:"12px",letterSpacing:"4px",color:"#999"}},"購物助手"),
      h("span",{style:{width:"40px"}}),
    ));
    const content = h("div",{style:{padding:"0 16px",flex:"1",overflow:"auto"}});
    content.appendChild(h("p",{style:{fontSize:"12px",color:"#555",lineHeight:"2",margin:"12px 0 16px",letterSpacing:"1px"}},"上傳想購買的商品照片，AI 根據衣櫃分析是否值得入手"));
    if (!s.shopImg) {
      content.appendChild(h("div",{style:{border:"1px solid #222",padding:"24px",textAlign:"center",cursor:"pointer",color:"#444",fontSize:"12px",letterSpacing:"2px"},onClick:()=>pickFile({},img=>setState({shopImg:img}))},"+  上傳商品照片"));
    } else {
      const imgWrap = h("div",{style:{position:"relative",marginBottom:"16px"}});
      imgWrap.appendChild(h("img",{src:s.shopImg,style:{width:"100%",maxHeight:"300px",objectFit:"cover",display:"block"}}));
      imgWrap.appendChild(h("button",{style:{position:"absolute",top:"8px",right:"8px",width:"28px",height:"28px",background:"rgba(0,0,0,.7)",border:"none",color:"#888",fontSize:"14px",cursor:"pointer"},onClick:()=>setState({shopImg:null,shopRes:null})},"×"));
      content.appendChild(imgWrap);
    }
    if (s.shopImg && !s.shopRes && !s.shopBusy) {
      content.appendChild(h("button",{className:"btn",onClick:analyzeShop},"分析"));
    }
    if (s.shopBusy) {
      const ld = h("div",{style:{textAlign:"center",padding:"30px"}});
      ld.appendChild(h("div",{className:"sp",style:{margin:"0 auto 12px"}}));
      ld.appendChild(h("span",{style:{color:"#555",fontSize:"12px"}},"分析中"));
      content.appendChild(ld);
    }
    if (s.shopRes) {
      const res = s.shopRes;
      const wrap = h("div",{style:{marginTop:"16px",animation:"fi .4s"}});
      const verdict = h("div",{style:{padding:"16px 0",borderTop:"1px solid #1a1a1a"}});
      verdict.appendChild(h("div",{style:{fontSize:"18px",fontWeight:"300",letterSpacing:"2px",color:res.v==="buy"?"#8ab48a":"#b48a8a",marginBottom:"8px"}},res.v==="buy"?"值得購入":"建議放棄"));
      verdict.appendChild(h("div",{style:{fontSize:"14px",color:"#ccc",marginBottom:"6px",fontWeight:"500"}},res.name));
      verdict.appendChild(h("div",{style:{fontSize:"12px",color:"#777",lineHeight:"2"}},res.reason));
      wrap.appendChild(verdict);
      if (res.fits?.length) {
        const fitsWrap = h("div",{style:{padding:"16px 0",borderTop:"1px solid #1a1a1a"}});
        fitsWrap.appendChild(h("div",{style:{fontSize:"11px",color:"#666",letterSpacing:"2px",marginBottom:"8px"}},"搭配方案"));
        res.fits.forEach(f => fitsWrap.appendChild(h("p",{style:{fontSize:"12px",color:"#888",lineHeight:"1.8",margin:"4px 0"}},f)));
        wrap.appendChild(fitsWrap);
      }
      if (res.style) {
        const styleWrap = h("div",{style:{padding:"16px 0",borderTop:"1px solid #1a1a1a"}});
        styleWrap.appendChild(h("div",{style:{fontSize:"11px",color:"#666",letterSpacing:"2px",marginBottom:"8px"}},"風格點評"));
        styleWrap.appendChild(h("p",{style:{fontSize:"12px",color:"#888",lineHeight:"1.8",margin:"0"}},res.style));
        wrap.appendChild(styleWrap);
      }
      wrap.appendChild(h("button",{className:"btn-o",style:{marginTop:"12px"},onClick:()=>setState({shopImg:null,shopRes:null})},"分析下一件"));
      content.appendChild(wrap);
    }
    app.appendChild(content);
    return;
  }

  // ── 設定 ──
  if (s.view === "settings") {
    app.appendChild(h("div",{className:"hd"},
      h("button",{className:"tx",onClick:()=>setState({view:"main"})},"返回"),
      h("span",{style:{fontSize:"12px",letterSpacing:"4px",color:"#999"}},"設定"),
      h("span",{style:{width:"40px"}}),
    ));
    const c = h("div",{style:{padding:"0 16px"}});
    c.appendChild(h("label",{className:"lb"},"代理伺服器"));
    const inp1 = h("input",{className:"ip",value:localStorage.getItem("wd_p")||PROXY_URL});
    inp1.addEventListener("change",e=>localStorage.setItem("wd_p",e.target.value));
    c.appendChild(inp1);
    c.appendChild(h("label",{className:"lb"},"API 金鑰"));
    const inp2 = h("input",{className:"ip",type:"password",value:localStorage.getItem("wd_t")||API_TOKEN});
    inp2.addEventListener("change",e=>localStorage.setItem("wd_t",e.target.value));
    c.appendChild(inp2);
    c.appendChild(h("div",{style:{marginTop:"24px",fontSize:"11px",color:"#444",lineHeight:"2",letterSpacing:"1px"}},"試穿 ≈ NT$0.8 / 次\n四角度 ≈ NT$5 / 次\n購物助手 ≈ NT$1 / 次"));
    app.appendChild(c);
    return;
  }

  // ━━━━━━ 主畫面 ━━━━━━
  if (s.busy) app.appendChild(renderLoading());
  if (s.err) {
    const errBar = h("div",{style:{position:"absolute",top:0,left:0,right:0,zIndex:99,padding:"10px 16px",background:"#1a1a1a",borderBottom:"1px solid #c44",color:"#c88",fontSize:"11px",letterSpacing:"1px",textAlign:"center"}},
      s.err,
      h("button",{className:"tx",style:{marginLeft:"10px"},onClick:()=>setState({err:null})},"×")
    );
    app.appendChild(errBar);
  }

  // 模特兒區
  const modelArea = h("div",{style:{flex:1,position:"relative",display:"flex",flexDirection:"column",background:"linear-gradient(180deg,#0d0d0d 0%,#141414 50%,#0d0d0d 100%)"}});
  // 頂光
  modelArea.appendChild(h("div",{style:{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:"300px",height:"200px",background:"radial-gradient(ellipse,rgba(255,255,255,.03) 0%,transparent 70%)",pointerEvents:"none"}}));
  // 導覽
  const nav = h("div",{style:{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"relative",zIndex:2}});
  nav.appendChild(h("span",{style:{fontSize:"11px",letterSpacing:"6px",color:"#555",fontWeight:"300"}},"FITTING ROOM"));
  const navR = h("div",{style:{display:"flex",gap:"16px"}});
  navR.appendChild(h("button",{className:"tx",onClick:()=>setState({view:"shop"})},"購物助手"));
  navR.appendChild(h("button",{className:"tx",onClick:()=>setState({view:"settings"})},"設定"));
  nav.appendChild(navR);
  modelArea.appendChild(nav);

  // 人像
  const portrait = h("div",{style:{flex:1,display:"flex",alignItems:"center",justifyContent:"center",position:"relative",padding:"0 20px"}});
  if (s.person) {
    portrait.appendChild(h("img",{src:s.person,style:{maxHeight:"100%",maxWidth:"100%",objectFit:"contain",filter:"drop-shadow(0 8px 24px rgba(0,0,0,.5))"}}));
  } else {
    const placeholder = h("div",{style:{cursor:"pointer",textAlign:"center"},onClick:()=>pickFile({},(img)=>setState({person:img}))});
    placeholder.innerHTML = `<div style="width:120px;height:180px;margin:0 auto;position:relative;opacity:.15">
      <div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:48px;border-radius:50%;background:#fff"></div>
      <div style="position:absolute;top:42px;left:50%;transform:translateX(-50%);width:60px;height:90px;border-radius:30px 30px 10px 10px;background:#fff"></div>
      <div style="position:absolute;top:130px;left:20px;width:16px;height:50px;border-radius:8px;background:#fff"></div>
      <div style="position:absolute;top:130px;left:84px;width:16px;height:50px;border-radius:8px;background:#fff"></div>
    </div><div style="font-size:11px;color:#444;letter-spacing:3px;margin-top:12px">上傳照片</div>`;
    portrait.appendChild(placeholder);
  }
  // 已選浮標
  if (si.length) {
    const floats = h("div",{style:{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",display:"flex",flexDirection:"column",gap:"2px"}});
    si.slice(0,5).forEach(it => {
      const box = h("div",{style:{width:"32px",height:"32px",overflow:"hidden",border:"1px solid #333",background:"#111"}});
      const img = h("img",{src:it.tb,style:{width:"100%",height:"100%",objectFit:"cover"}});
      img.onerror = () => img.style.display = "none";
      box.appendChild(img);
      floats.appendChild(box);
    });
    portrait.appendChild(floats);
  }
  modelArea.appendChild(portrait);

  // 底部操作
  const actions = h("div",{style:{padding:"8px 16px 10px",display:"flex",gap:"8px",justifyContent:"center",alignItems:"center",position:"relative",zIndex:2}});
  if (s.person) actions.appendChild(h("button",{className:"tx",style:{fontSize:"10px"},onClick:()=>setState({person:null})},"更換模特兒"));
  actions.appendChild(h("button",{style:{padding:"10px 24px",background:"transparent",border:"1px solid #333",color:"#aaa",fontSize:"11px",letterSpacing:"3px",cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif"},onClick:()=>setState({view:"wardrobe"})},"衣櫃"));
  const genBtn = h("button",{style:{padding:"10px 32px",background:"#fff",border:"none",color:"#000",fontSize:"12px",letterSpacing:"3px",fontWeight:"500",cursor:s.person&&si.length?"pointer":"default",opacity:s.person&&si.length?1:.2,fontFamily:"'Noto Sans TC',sans-serif"},onClick:generate},"試穿"+(si.length?" "+si.length:""));
  actions.appendChild(genBtn);
  modelArea.appendChild(actions);
  app.appendChild(modelArea);

  // 商品列
  const shelf = h("div",{style:{background:"#0a0a0a",borderTop:"1px solid #1a1a1a",flexShrink:0}});
  const catTabs = h("div",{style:{display:"flex",overflow:"auto",gap:0,padding:"0 8px"}});
  CATS.forEach(c => {
    catTabs.appendChild(h("button",{style:{flexShrink:0,padding:"8px 14px",background:"none",border:"none",borderBottom:s.cat===c.id?"1px solid #888":"1px solid transparent",color:s.cat===c.id?"#ccc":"#444",fontSize:"11px",letterSpacing:"2px",cursor:"pointer",fontFamily:"'Noto Sans TC',sans-serif"},onClick:()=>setState({cat:c.id})},c.name));
  });
  shelf.appendChild(catTabs);
  const productRow = h("div",{style:{display:"flex",gap:"2px",overflow:"auto",padding:"6px 8px 10px",WebkitOverflowScrolling:"touch"}});
  ci.forEach(it => {
    const on = s.sel[it.c] === it.id;
    const card = h("div",{style:{flexShrink:0,width:"68px",cursor:"pointer"},onClick:()=>toggle(it)});
    const box = h("div",{style:{width:"68px",height:"68px",overflow:"hidden",position:"relative",outline:on?"1px solid #fff":"none",background:"#111"}});
    const img = h("img",{src:it.tb,style:{width:"100%",height:"100%",objectFit:"cover",display:"block"}});
    img.onerror = () => img.style.display = "none";
    box.appendChild(img);
    if (on) box.appendChild(h("div",{style:{position:"absolute",inset:0,background:"rgba(255,255,255,.06)"}}));
    card.appendChild(box);
    card.appendChild(h("div",{style:{fontSize:"9px",color:on?"#aaa":"#444",padding:"3px 0",letterSpacing:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},it.n));
    productRow.appendChild(card);
  });
  if (!ci.length) productRow.appendChild(h("div",{style:{padding:"16px",color:"#333",fontSize:"11px"}},"空"));
  shelf.appendChild(productRow);
  app.appendChild(shelf);
}

function renderLoading() {
  const overlay = h("div",{style:{position:"absolute",inset:0,zIndex:100,background:"rgba(0,0,0,.94)",backdropFilter:"blur(16px)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"16px"}});
  const spinWrap = h("div",{style:{width:"48px",height:"48px",position:"relative"}});
  spinWrap.appendChild(h("div",{className:"sp",style:{width:"48px",height:"48px"}}));
  spinWrap.appendChild(h("div",{style:{position:"absolute",inset:0,display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",color:"#888"}},Math.round(state.pct)+"%"));
  overlay.appendChild(spinWrap);
  overlay.appendChild(h("div",{style:{color:"#666",fontSize:"12px",letterSpacing:"2px"}},state.step));
  const bar = h("div",{style:{width:"120px",height:"1px",background:"#222"}});
  bar.appendChild(h("div",{style:{width:state.pct+"%",height:"100%",background:"#888",transition:"width .5s"}}));
  overlay.appendChild(bar);
  return overlay;
}

init();
</script>
</body>
</html>
