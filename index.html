// ━━━ Auth ━━━
async function googleLogin(){
  if(!fbOK()){setState({err:"請先設定 Firebase"});return}
  try{
    const p=new firebase.auth.GoogleAuthProvider();
    await auth.signInWithPopup(p);
  }catch(e){
    if(e.code==="auth/popup-blocked"){
      await auth.signInWithRedirect(new firebase.auth.GoogleAuthProvider());
    } else if(e.code!=="auth/popup-closed-by-user"){
      setState({err:"登入失敗："+e.message});
    }
  }
}
async function logout(){
  await auth.signOut();
  currentUser=null;
  setState({items:[],sel:{},person:null,result:null,view:"login"});
}

// ━━━ Firestore ━━━
function uDoc(){return fsdb.collection("users").doc(currentUser.uid)}
function iCol(){return uDoc().collection("items")}

async function cloudLoadSettings(){
  const s=await uDoc().get();
  if(s.exists){const d=s.data();if(d.proxy)localStorage.setItem("wd_p",d.proxy);if(d.token)localStorage.setItem("wd_t",d.token)}
}
async function cloudSaveSettings(){
  await uDoc().set({proxy:getProxy(),token:getToken(),name:currentUser.displayName||"",photo:currentUser.photoURL||"",ts:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
}
async function cloudLoadItems(){
  const s=await iCol().orderBy("ts","desc").get();
  const a=[];s.forEach(d=>{const o=d.data();o.id=d.id;a.push(o)});return a;
}
async function cloudPutItem(item){
  const o={...item};
  // base64 太大只存縮圖到雲端
  if(o.img&&o.img.startsWith("data:")&&o.img.length>200000)o.img=o.tb;
  await iCol().doc(item.id).set(o);
}
async function cloudDelItem(id){await iCol().doc(id).delete()}
async function cloudBatchPut(items){
  for(let i=0;i<items.length;i+=400){
    const b=fsdb.batch();
    items.slice(i,i+400).forEach(it=>b.set(iCol().doc(it.id),it));
    await b.commit();
  }
}

// ━━━ IndexedDB（離線快取）━━━
const DBN="WDF",SN="i";
function odb(){return new Promise((r,j)=>{const q=indexedDB.open(DBN,1);q.onupgradeneeded=e=>{if(!e.target.result.objectStoreNames.contains(SN))e.target.result.createObjectStore(SN,{keyPath:"id"}).createIndex("c","c")};q.onsuccess=()=>r(q.result);q.onerror=()=>j(q.error)})}
async function dbAll(){const d=await odb();return new Promise(r=>{d.transaction(SN).objectStore(SN).getAll().onsuccess=e=>r(e.target.result)})}
async function dbPut(i){const d=await odb();return new Promise(r=>{const t=d.transaction(SN,"readwrite");t.objectStore(SN).put(i);t.oncomplete=r})}
async function dbDel(id){const d=await odb();return new Promise(r=>{const t=d.transaction(SN,"readwrite");t.objectStore(SN).delete(id);t.oncomplete=r})}
async function dbClear(){const d=await odb();return new Promise(r=>{const t=d.transaction(SN,"readwrite");t.objectStore(SN).clear();t.oncomplete=r})}

// ━━━ 工具 ━━━
const uid=()=>Date.now().toString(36)+Math.random().toString(36).slice(2,6);
function f2b(f){return new Promise(r=>{const a=new FileReader;a.onload=()=>r(a.result);a.readAsDataURL(f)})}
function rsz(d,m=1024){return new Promise(r=>{const i=new Image;i.onload=()=>{let w=i.width,h=i.height;if(w>m||h>m){const s=Math.min(m/w,m/h);w=w*s|0;h=h*s|0}const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(i,0,0,w,h);r(c.toDataURL("image/jpeg",.85))};i.src=d})}
function rszTb(d,m=256){return new Promise(r=>{const i=new Image;i.onload=()=>{let w=i.width,h=i.height;const s=Math.min(m/w,m/h,1);w=w*s|0;h=h*s|0;const c=document.createElement("canvas");c.width=w;c.height=h;c.getContext("2d").drawImage(i,0,0,w,h);r(c.toDataURL("image/jpeg",.6))};i.src=d})}

function getProxy(){return localStorage.getItem("wd_p")||PROXY}
function getToken(){return localStorage.getItem("wd_t")||""}

async function apiCall(model,input){
  const tk=getToken();
  if(!tk){setState({err:"請先到設定頁面輸入 API 金鑰"});return null}
  const r=await fetch(`${getProxy()}/api/predict`,{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({model,input,token:tk})});
  if(!r.ok)throw new Error(await r.text());
  const d=await r.json();if(d.error)throw new Error(d.error);
  return Array.isArray(d.output)?d.output[0]:d.output;
}

async function shopAI(img,items){
  const desc=items.map(i=>{const c=CATS.find(x=>x.id===i.c);return`${c?.name}: ${i.n}`}).join("\n");
  const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
    body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:800,
      messages:[{role:"user",content:[
        {type:"image",source:{type:"base64",media_type:"image/jpeg",data:img.split(",")[1]}},
        {type:"text",text:`專業時尚顧問。分析照片中這件單品。我的衣櫃：\n${desc||"空"}\n用繁體中文純JSON回答：{"name":"商品名","v":"buy"或"skip","reason":"分析原因","fits":["搭配方案1","搭配方案2"],"style":"風格評語"}`}
      ]}]})});
  const j=await r.json();const t=j.content?.find(b=>b.type==="text")?.text||"";
  try{return JSON.parse(t.replace(/```json|```/g,"").trim())}catch{return{name:"商品",v:"skip",reason:t,fits:[],style:""}}
}

let state={items:[],cat:"tops",sel:{},person:null,result:null,busy:false,step:"",pct:0,view:"loading",err:null,edit:false,shopImg:null,shopRes:null,shopBusy:false,syncing:false,composeBase:null,composeAccs:[]};
function setState(p){Object.assign(state,p);render()}

// ━━━ 初始化 ━━━
async function init(){
  if(!fbOK()){setState({view:"setup"});return}
  auth.onAuthStateChanged(async user=>{
    if(user){
      currentUser=user;
      setState({syncing:true,view:"main"});
      try{
        await cloudLoadSettings();
        let items=await cloudLoadItems();
        if(!items.length){
          const b=[];for(const[k,v]of Object.entries(PS))for(const x of v)b.push({id:uid(),c:k,img:UNS(x.u),tb:UNS(x.u),n:x.n,ts:Date.now()+Math.random()*1e3});
          await cloudBatchPut(b);items=b;
        }
        await dbClear().catch(()=>{});
        for(const i of items)await dbPut(i).catch(()=>{});
        setState({items,syncing:false});
      }catch(e){
        const local=await dbAll().catch(()=>[]);
        setState({items:local,syncing:false,err:local.length?"離線模式":"同步失敗："+e.message});
      }
    }else{
      currentUser=null;
      setState({view:"login",items:[]});
    }
  });
}

// ━━━ 操作 ━━━
function selItems(){return Object.values(state.sel).map(id=>state.items.find(i=>i.id===id)).filter(Boolean)}
function catItems(){return state.items.filter(i=>i.c===state.cat).sort((a,b)=>b.ts-a.ts)}
function toggle(item){const s={...state.sel};s[item.c]===item.id?delete s[item.c]:s[item.c]=item.id;setState({sel:s})}

async function addItem(c,img,n){
  const tb=await rszTb(img);
  const i={id:uid(),c,img,tb,n,ts:Date.now()};
  await dbPut(i);
  if(currentUser)cloudPutItem(i).catch(()=>{});
  setState({items:[...state.items,i]});
}
async function removeItem(id){
  await dbDel(id);
  if(currentUser)cloudDelItem(id).catch(()=>{});
  const s={...state.sel};Object.keys(s).forEach(k=>{if(s[k]===id)delete s[k]});
  setState({items:state.items.filter(i=>i.id!==id),sel:s});
}
function pickFile(opts,cb){const inp=document.createElement("input");inp.type="file";inp.accept="image/*";if(opts.multi)inp.multiple=true;inp.onchange=async e=>{for(const f of Array.from(e.target.files||[])){const b=await f2b(f),r=await rsz(b);cb(r,f.name.replace(/\.[^.]+$/,""))}};inp.click()}

// ━━━ 智能定位（Claude Vision）━━━
async function detectPose(personImg){
  try{
    const imgData=personImg.startsWith("data:")?personImg.split(",")[1]:null;
    const content=[
      ...(imgData?[{type:"image",source:{type:"base64",media_type:"image/jpeg",data:imgData}}]:[{type:"image",source:{type:"url",url:personImg}}]),
      {type:"text",text:`分析這張人物照片，回傳身體部位的相對位置座標（0~1，左上角為0,0）。純JSON回答，不要其他文字：{"head_top":{"x":0.5,"y":0.1},"head_center":{"x":0.5,"y":0.15},"neck":{"x":0.5,"y":0.22},"chest":{"x":0.5,"y":0.35},"waist":{"x":0.5,"y":0.5},"left_hand":{"x":0.3,"y":0.5},"right_hand":{"x":0.7,"y":0.5},"feet":{"x":0.5,"y":0.95},"shoulder_width":0.3,"head_width":0.12}`}
    ];
    const r=await fetch("https://api.anthropic.com/v1/messages",{method:"POST",headers:{"Content-Type":"application/json"},
      body:JSON.stringify({model:"claude-sonnet-4-20250514",max_tokens:400,messages:[{role:"user",content}]})});
    const j=await r.json();const t=j.content?.find(b=>b.type==="text")?.text||"";
    return JSON.parse(t.replace(/```json|```/g,"").trim());
  }catch(e){
    // 偵測失敗用預設值
    return{head_top:{x:.5,y:.05},head_center:{x:.5,y:.12},neck:{x:.5,y:.2},chest:{x:.5,y:.35},waist:{x:.5,y:.5},left_hand:{x:.25,y:.5},right_hand:{x:.75,y:.5},feet:{x:.5,y:.95},shoulder_width:.3,head_width:.12};
  }
}

// 根據類別+姿態計算位置
function accPosition(cat,pose){
  const p=pose;
  switch(cat){
    case"hats":return{x:p.head_center.x,y:p.head_top.y,s:p.head_width*1.6};
    case"jewelry":return{x:p.neck.x,y:p.neck.y,s:p.shoulder_width*.4};

// ━━━ 生成 ━━━
async function generate(){
  const si=selItems();if(!state.person||!si.length)return;
  const cloth=si.filter(i=>CATS.find(c=>c.id===i.c)?.t);
  const accs=si.filter(i=>!CATS.find(c=>c.id===i.c)?.t);
  if(!cloth.length&&!accs.length)return;
  setState({busy:true,result:null,err:null});
  try{
    let base=state.person;
    // 衣物試穿
    if(cloth.length){
      for(let i=0;i<cloth.length;i++){
        setState({step:`試穿 ${cloth[i].n}`,pct:5+i/cloth.length*40});
        base=await apiCall("cuuupid/idm-vton",{human_img:base,garm_img:cloth[i].img,garment_des:"clothing item",category:CATS.find(c=>c.id===cloth[i].c).t,crop:false,seed:42,steps:30});
        if(!base)return;
      }
    }
    // 配件合成
    if(accs.length){
      // 偵測人物姿態
      setState({step:"分析人物位置",pct:50});
      const pose=await detectPose(base);
      // 去背 + 定位
      const cAcc=[];
      for(let i=0;i<accs.length;i++){
        setState({step:`去背 ${accs[i].n}`,pct:55+i/accs.length*35});
        const cleaned=await removeBg(accs[i].img);
        const pos=accPosition(accs[i].c,pose);
        cAcc.push({item:{...accs[i],cleanImg:cleaned},x:pos.x,y:pos.y,s:pos.s,active:false});
      }
      setState({composeBase:base,composeAccs:cAcc,pct:100,view:"compose"});
    }else{
      setState({result:base,pct:100,view:"result"});
    }
  }catch(e){setState({err:e.message})}
  finally{setState({busy:false,step:"",pct:0})}
}

// 合成輸出
function composeExport(){
  const base=state.composeBase,accs=state.composeAccs;
  const cv=document.createElement("canvas");
  const img=new Image;img.crossOrigin="anonymous";
  img.onload=()=>{
    cv.width=img.width;cv.height=img.height;
    const ctx=cv.getContext("2d");ctx.drawImage(img,0,0);
    let loaded=0;const total=accs.length;
    if(!total){setState({result:cv.toDataURL("image/jpeg",.9),view:"result"});return}
    accs.forEach(a=>{
      const ai=new Image;ai.crossOrigin="anonymous";
      ai.onload=()=>{
        const w=img.width*a.s,h=w*(ai.height/ai.width);
        const x=img.width*a.x-w/2,y=img.height*a.y-h/2;
        ctx.drawImage(ai,x,y,w,h);
        loaded++;if(loaded===total)setState({result:cv.toDataURL("image/jpeg",.9),view:"result"});
      };
      ai.onerror=()=>{loaded++;if(loaded===total)setState({result:cv.toDataURL("image/jpeg",.9),view:"result"})};
      ai.src=a.item.cleanImg||a.item.img;
    });
  };
  img.src=base;
}

// ━━━ 合成觸控 ━━━
let dragAcc=null,dragStart=null,pinchStart=null;
function composeTouch(e,rect,accIdx){
  e.preventDefault();
  const touches=e.touches;
  if(touches.length===1&&accIdx!=null){
    dragAcc=accIdx;dragStart={x:touches[0].clientX,y:touches[0].clientY,ox:state.composeAccs[accIdx].x,oy:state.composeAccs[accIdx].y};
  }else if(touches.length===2&&dragAcc!=null){
    pinchStart={d:Math.hypot(touches[0].clientX-touches[1].clientX,touches[0].clientY-touches[1].clientY),s:state.composeAccs[dragAcc].s};
  }
}
function composeMove(e,rect){
  e.preventDefault();const t=e.touches;
  if(t.length===1&&dragAcc!=null&&dragStart){
    const dx=(t[0].clientX-dragStart.x)/rect.width,dy=(t[0].clientY-dragStart.y)/rect.height;
    const a=[...state.composeAccs];a[dragAcc]={...a[dragAcc],x:Math.max(0,Math.min(1,dragStart.ox+dx)),y:Math.max(0,Math.min(1,dragStart.oy+dy))};
    state.composeAccs=a;render();
  }else if(t.length===2&&dragAcc!=null&&pinchStart){
    const d=Math.hypot(t[0].clientX-t[1].clientX,t[0].clientY-t[1].clientY);
    const a=[...state.composeAccs];a[dragAcc]={...a[dragAcc],s:Math.max(.05,Math.min(.8,pinchStart.s*(d/pinchStart.d)))};
    state.composeAccs=a;render();
  }
}
function composeEnd(){dragAcc=null;dragStart=null;pinchStart=null}
// Mouse fallback
let mouseAcc=null,mouseStart=null;
function composeMD(e,rect,idx){mouseAcc=idx;mouseStart={x:e.clientX,y:e.clientY,ox:state.composeAccs[idx].x,oy:state.composeAccs[idx].y}}
function composeMM(e,rect){
  if(mouseAcc==null||!mouseStart)return;
  const dx=(e.clientX-mouseStart.x)/rect.width,dy=(e.clientY-mouseStart.y)/rect.height;
  const a=[...state.composeAccs];a[mouseAcc]={...a[mouseAcc],x:Math.max(0,Math.min(1,mouseStart.ox+dx)),y:Math.max(0,Math.min(1,mouseStart.oy+dy))};
  state.composeAccs=a;render();
}
function composeMU(){mouseAcc=null;mouseStart=null}

      v.appendChild(h("div",{style:{fontSize:"12px",color:"#777",lineHeight:"2"}},res.reason));w.appendChild(v);
      if(res.fits?.length){const fw=h("div",{style:{padding:"16px 0",borderTop:"1px solid #1a1a1a"}});fw.appendChild(h("div",{style:{fontSize:"11px",color:"#666",letterSpacing:"2px",marginBottom:"8px"}},"搭配方案"));res.fits.forEach(f=>fw.appendChild(h("p",{style:{fontSize:"12px",color:"#888",lineHeight:"1.8",margin:"4px 0"}},f)));w.appendChild(fw)}
      if(res.style){const sw=h("div",{style:{padding:"16px 0",borderTop:"1px solid #1a1a1a"}});sw.appendChild(h("div",{style:{fontSize:"11px",color:"#666",letterSpacing:"2px",marginBottom:"8px"}},"風格點評"));sw.appendChild(h("p",{style:{fontSize:"12px",color:"#888",lineHeight:"1.8",margin:"0"}},res.style));w.appendChild(sw)}
      w.appendChild(h("button",{className:"btn-o",style:{marginTop:"12px"},onClick:()=>setState({shopImg:null,shopRes:null})},"分析下一件"));ct.appendChild(w)}
    app.appendChild(ct);return;
  }

  // ── 設定 ──
  if(s.view==="settings"){
    app.appendChild(h("div",{className:"hd"},
      h("button",{className:"tx",onClick:()=>{if(getToken())setState({view:"main"});else setState({err:"請先輸入 API 金鑰"})}},"返回"),
      h("span",{style:{fontSize:"12px",letterSpacing:"4px",color:"#999"}},"設定"),
      h("span",{style:{width:"40px"}})));
    const c=h("div",{style:{padding:"0 16px",flex:"1",overflow:"auto"}});
    // 帳號區
    if(currentUser){
      const uw=h("div",{style:{display:"flex",alignItems:"center",gap:"12px",padding:"16px 0",borderBottom:"1px solid #1a1a1a"}});
      if(currentUser.photoURL)uw.appendChild(h("img",{src:currentUser.photoURL,className:"avatar"}));
      const ui=h("div",{style:{flex:"1"}});
      ui.appendChild(h("div",{style:{fontSize:"13px",color:"#ccc",fontWeight:"500"}},currentUser.displayName||"使用者"));
      ui.appendChild(h("div",{style:{fontSize:"10px",color:"#555",marginTop:"2px"}},currentUser.email||""));
      uw.appendChild(ui);
      uw.appendChild(h("button",{className:"tx",style:{color:"#c44",padding:"6px 12px",border:"1px solid #333"},onClick:logout},"登出"));
      c.appendChild(uw);
    }
    if(!getToken())c.appendChild(h("div",{style:{padding:"14px",margin:"12px 0",background:"rgba(200,160,96,0.08)",border:"1px solid rgba(200,160,96,0.15)",borderRadius:"4px",fontSize:"12px",color:"#c9a060",lineHeight:"1.8"}},"請輸入 Replicate API 金鑰\nreplicate.com/account/api-tokens"));
    c.appendChild(h("label",{className:"lb"},"代理伺服器"));
    const i1=h("input",{className:"ip",value:getProxy()});
    i1.addEventListener("change",e=>{localStorage.setItem("wd_p",e.target.value);if(currentUser)cloudSaveSettings().catch(()=>{})});
    c.appendChild(i1);
    c.appendChild(h("label",{className:"lb"},"API 金鑰"));
    const i2=h("input",{className:"ip",type:"password",value:getToken()});
    i2.addEventListener("change",e=>{localStorage.setItem("wd_t",e.target.value);if(currentUser)cloudSaveSettings().catch(()=>{})});
    c.appendChild(i2);
    c.appendChild(h("div",{style:{marginTop:"24px",fontSize:"11px",color:"#444",lineHeight:"2",letterSpacing:"1px"}},"試穿 ≈ NT$0.8 / 件　配件去背 ≈ NT$0.3 / 件\n設定自動同步至雲端帳號"));
    app.appendChild(c);return;
  }

  // ━━━ 主畫面 ━━━
  if(s.busy)app.appendChild(renderLoading());
  if(s.syncing)app.appendChild(renderSyncing());
  if(s.err){app.appendChild(h("div",{style:{position:"absolute",top:0,left:0,right:0,zIndex:"99",padding:"10px 16px",background:"#1a1a1a",borderBottom:"1px solid #c44",color:"#c88",fontSize:"11px",letterSpacing:"1px",textAlign:"center"}},s.err,h("button",{className:"tx",style:{marginLeft:"10px"},onClick:()=>setState({err:null})},"×")))}

  const ma=h("div",{style:{flex:"1",position:"relative",display:"flex",flexDirection:"column",background:"linear-gradient(180deg,#0d0d0d 0%,#141414 50%,#0d0d0d 100%)"}});
  ma.appendChild(h("div",{style:{position:"absolute",top:0,left:"50%",transform:"translateX(-50%)",width:"300px",height:"200px",background:"radial-gradient(ellipse,rgba(255,255,255,.03) 0%,transparent 70%)",pointerEvents:"none"}}));

  const nav=h("div",{style:{padding:"12px 16px",display:"flex",justifyContent:"space-between",alignItems:"center",position:"relative",zIndex:"2"}});
  const navL=h("div",{style:{display:"flex",alignItems:"center",gap:"10px"}});
  navL.appendChild(h("span",{style:{fontSize:"11px",letterSpacing:"6px",color:"#555",fontWeight:"300"}},"FITTING ROOM"));
  if(currentUser?.photoURL){
    navL.appendChild(h("img",{src:currentUser.photoURL,style:{width:"22px",height:"22px",borderRadius:"50%",border:"1px solid #333",objectFit:"cover",cursor:"pointer"},onClick:()=>setState({view:"settings"})}));
  }
  nav.appendChild(navL);
  const nr=h("div",{style:{display:"flex",gap:"16px"}});
  nr.appendChild(h("button",{className:"tx",onClick:()=>setState({view:"shop"})},"購物助手"));
  nr.appendChild(h("button",{className:"tx",onClick:()=>setState({view:"settings"})},"設定"));
  nav.appendChild(nr);ma.appendChild(nav);

  const port=h("div",{style:{flex:"1",display:"flex",alignItems:"center",justifyContent:"center",position:"relative",padding:"0 20px"}});
  if(s.person){port.appendChild(h("img",{src:s.person,style:{maxHeight:"100%",maxWidth:"100%",objectFit:"contain",filter:"drop-shadow(0 8px 24px rgba(0,0,0,.5))"}}))}
  else{const ph=h("div",{style:{cursor:"pointer",textAlign:"center"},onClick:()=>pickFile({},(img)=>setState({person:img}))});
    ph.innerHTML=`<div style="width:120px;height:180px;margin:0 auto;position:relative;opacity:.15"><div style="position:absolute;top:0;left:50%;transform:translateX(-50%);width:40px;height:48px;border-radius:50%;background:#fff"></div><div style="position:absolute;top:42px;left:50%;transform:translateX(-50%);width:60px;height:90px;border-radius:30px 30px 10px 10px;background:#fff"></div><div style="position:absolute;top:130px;left:20px;width:16px;height:50px;border-radius:8px;background:#fff"></div><div style="position:absolute;top:130px;left:84px;width:16px;height:50px;border-radius:8px;background:#fff"></div></div><div style="font-size:11px;color:#444;letter-spacing:3px;margin-top:12px">上傳照片</div>`;
    port.appendChild(ph)}
  if(si.length){const fl=h("div",{style:{position:"absolute",right:"8px",top:"50%",transform:"translateY(-50%)",display:"flex",flexDirection:"column",gap:"2px"}});
    si.slice(0,5).forEach(it=>{const box=h("div",{style:{width:"32px",height:"32px",overflow:"hidden",border:"1px solid #333",background:"#111"}});const img=h("img",{src:it.tb,style:{width:"100%",height:"100%",objectFit:"cover"}});img.onerror=()=>img.style.display="none";box.appendChild(img);fl.appendChild(box)});port.appendChild(fl)}
  ma.appendChild(port);

  const acts=h("div",{style:{padding:"8px 16px 10px",display:"flex",gap:"8px",justifyContent:"center",alignItems:"center",position:"relative",zIndex:"2"}});
  if(s.person)acts.appendChild(h("button",{className:"tx",style:{fontSize:"10px"},onClick:()=>setState({person:null})},"更換"));
  acts.appendChild(h("button",{style:{padding:"10px 24px",background:"transparent",border:"1px solid #333",color:"#aaa",fontSize:"11px",letterSpacing:"3px",cursor:"pointer",fontFamily:"'Noto Sans TC'"},onClick:()=>setState({view:"wardrobe"})},"衣櫃"));
  const canTry=s.person&&si.length>0;
  acts.appendChild(h("button",{style:{padding:"10px 32px",background:canTry?"#fff":"#222",border:"none",color:canTry?"#000":"#555",fontSize:"12px",letterSpacing:"3px",fontWeight:"500",cursor:canTry?"pointer":"default",fontFamily:"'Noto Sans TC'"},onClick:canTry?generate:undefined},"試穿"));
  ma.appendChild(acts);app.appendChild(ma);

  const shelf=h("div",{style:{background:"#0a0a0a",borderTop:"1px solid #1a1a1a",flexShrink:"0"}});
  const ct=h("div",{style:{display:"flex",overflow:"auto",gap:"0",padding:"0 8px"}});
  CATS.forEach(c=>ct.appendChild(h("button",{style:{flexShrink:"0",padding:"8px 14px",background:"none",border:"none",borderBottom:s.cat===c.id?"1px solid #888":"1px solid transparent",color:s.cat===c.id?"#ccc":"#444",fontSize:"11px",letterSpacing:"2px",cursor:"pointer",fontFamily:"'Noto Sans TC'"},onClick:()=>setState({cat:c.id})},c.name)));
  shelf.appendChild(ct);
  const row=h("div",{style:{display:"flex",gap:"2px",overflow:"auto",padding:"6px 8px 10px",WebkitOverflowScrolling:"touch"}});
  ci.forEach(it=>{const on=s.sel[it.c]===it.id;const card=h("div",{style:{flexShrink:"0",width:"68px",cursor:"pointer"},onClick:()=>toggle(it)});
    const box=h("div",{style:{width:"68px",height:"68px",overflow:"hidden",position:"relative",outline:on?"1px solid #fff":"none",background:"#111"}});
    const img=h("img",{src:it.tb,style:{width:"100%",height:"100%",objectFit:"cover",display:"block"}});img.onerror=()=>img.style.display="none";
    box.appendChild(img);if(on)box.appendChild(h("div",{style:{position:"absolute",inset:"0",background:"rgba(255,255,255,.06)"}}));
    card.appendChild(box);card.appendChild(h("div",{style:{fontSize:"9px",color:on?"#aaa":"#444",padding:"3px 0",letterSpacing:"1px",overflow:"hidden",textOverflow:"ellipsis",whiteSpace:"nowrap"}},it.n));
    row.appendChild(card)});
  if(!ci.length)row.appendChild(h("div",{style:{padding:"16px",color:"#333",fontSize:"11px"}},"空"));
  shelf.appendChild(row);app.appendChild(shelf);
}

function renderLoading(){
  const o=h("div",{style:{position:"absolute",inset:"0",zIndex:"100",background:"rgba(0,0,0,.94)",backdropFilter:"blur(16px)",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:"16px"}});
  const sw=h("div",{style:{width:"48px",height:"48px",position:"relative"}});
  sw.appendChild(h("div",{className:"sp",style:{width:"48px",height:"48px"}}));
  sw.appendChild(h("div",{style:{position:"absolute",inset:"0",display:"flex",alignItems:"center",justifyContent:"center",fontSize:"11px",color:"#888"}},Math.round(state.pct)+"%"));
  o.appendChild(sw);o.appendChild(h("div",{style:{color:"#666",fontSize:"12px",letterSpacing:"2px"}},state.step));
  const bar=h("div",{style:{width:"120px",height:"1px",background:"#222"}});
  bar.appendChild(h("div",{style:{width:state.pct+"%",height:"100%",background:"#888",transition:"width .5s"}}));
  o.appendChild(bar);return o;
}
function renderSyncing(){
  return h("div",{style:{position:"absolute",top:"0",left:"0",right:"0",zIndex:"50",padding:"6px 16px",background:"#111",display:"flex",alignItems:"center",justifyContent:"center",gap:"8px"}},
    h("div",{className:"sp",style:{width:"14px",height:"14px",borderWidth:"1px"}}),
    h("span",{style:{fontSize:"10px",color:"#666",letterSpacing:"2px"}},"同步中"));
}

init();
</script>
</body>
</html>
